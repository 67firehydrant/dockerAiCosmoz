name: Interactive KVM Web Terminal

on:
  workflow_dispatch:

jobs:
  web-terminal:
    name: Start Web Terminal with KVM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure KVM Permissions
        run: |
          if [ -e /dev/kvm ]; then
            echo "KVM is available on this runner!"
            sudo chmod 666 /dev/kvm
          else
            echo "Error: KVM is not available."
            exit 1
          fi

      - name: Install Microsandbox (msb)
        run: |
          curl -fsSL https://install.microsandbox.dev | sh
          echo "/home/runner/.local/bin" >> $GITHUB_PATH

      - name: Cache OCI Images
        run: |
          # Pre-pull image agar instan saat dijalankan di terminal
          /home/runner/.local/bin/msb pull alpine &
          /home/runner/.local/bin/msb pull ubuntu:24.04 &

      - name: Install ttyd (Web Terminal)
        run: |
          sudo curl -sLo /usr/local/bin/ttyd https://github.com/tsl0922/ttyd/releases/download/1.7.7/ttyd.x86_64
          sudo chmod +x /usr/local/bin/ttyd

      - name: Install Cloudflared (Tunnel)
        run: |
          curl -L --output cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      - name: Start TUI Services and Keep Alive
        run: |
          # 1. Jalankan ttyd pada port 5000 secara background
          export PATH="/home/runner/.local/bin:$PATH"
          ttyd -W -p 5000 python3 modal/tui_dashboard.py &
          
          # 2. Jalankan cloudflared tunnel secara background
          ./cloudflared tunnel --url http://localhost:5000 > cloudflared.log 2>&1 &
          
          # 3. Menunggu Cloudflare membuat terowongan dan mengambil tautan publik
          echo "Menunggu Cloudflare Tunnel membuat tautan publik..."
          for i in {1..30}; do
            if grep -qE "https://[a-zA-Z0-9.-]+\.trycloudflare\.com" cloudflared.log; then
              URL=$(grep -oE "https://[a-zA-Z0-9.-]+\.trycloudflare\.com" cloudflared.log | head -n 1)
              
              echo -e "\n\n"
              echo -e "\033[92m=================================================================\033[0m"
              echo -e "\033[92m                  KVM TERMINAL PANEL (TUI) READY!                \033[0m"
              echo -e "  Klik tautan di bawah ini untuk membuka dashboard terminal:     "
              echo -e "  \033[96m$URL\033[0m"
              echo -e "\n  Tautan ini aktif selama workflow ini berjalan (maks. 6 jam)."
              echo -e "\033[92m=================================================================\033[0m"
              echo -e "\n\n"
              
              # Tulis ke Job Summary
              echo "### 🖥️ KVM Terminal Dashboard (TUI)" >> $GITHUB_STEP_SUMMARY
              echo "Klik tautan berikut untuk membuka terminal interaktif otomatis Anda:" >> $GITHUB_STEP_SUMMARY
              echo "👉 **[$URL]($URL)**" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "Setelah tautan dibuka, Anda akan langsung disajikan menu interaktif:" >> $GITHUB_STEP_SUMMARY
              echo "1. **Opsi 1**: Buat MicroVM Baru secara otomatis (pilih OS Ubuntu/Debian/Alpine, vCPU, RAM)." >> $GITHUB_STEP_SUMMARY
              echo "2. **Opsi 2**: Kelola & langsung masuk ke shell MicroVM yang aktif tanpa mengetik perintah manual." >> $GITHUB_STEP_SUMMARY
              echo "3. **Opsi 3**: Keluar ke normal host bash shell untuk mengetik perintah mentah." >> $GITHUB_STEP_SUMMARY
              break
            fi
            sleep 1
          done
          
          # 4. Jaga agar runner tetap hidup (sleep 6 jam)
          echo "Menjaga Runner tetap hidup. Silakan gunakan tautan web terminal Anda."
          echo "Pekerjaan ini akan otomatis berhenti setelah 6 jam atau jika Anda menekan 'Cancel workflow'."
          sleep 21600
